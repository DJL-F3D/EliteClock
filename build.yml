name: Build Elite Clock Firmware

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build ESP32-C3 Firmware
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Cache PlatformIO packages (speeds up subsequent runs) ─────────
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      # ── 3. Set up Python (PlatformIO requires it) ─────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Install PlatformIO CLI ─────────────────────────────────────────
      - name: Install PlatformIO
        run: |
          pip install --upgrade pip
          pip install platformio

      # ── 5. Build firmware .bin ────────────────────────────────────────────
      - name: Build firmware
        run: |
          cd elite-clock
          pio run --environment esp32-c3-super-mini

      # ── 6. Build LittleFS filesystem image (contains web UI) ──────────────
      - name: Build filesystem image
        run: |
          cd elite-clock
          pio run --target buildfs --environment esp32-c3-super-mini

      # ── 7. Report firmware size ───────────────────────────────────────────
      - name: Firmware size report
        run: |
          cd elite-clock
          pio run --environment esp32-c3-super-mini --target size 2>/dev/null || true
          echo ""
          FW=$(find .pio/build/esp32-c3-super-mini -name 'firmware.bin' | head -1)
          FS=$(find .pio/build/esp32-c3-super-mini -name 'littlefs.bin' | head -1)
          echo "=== Binary sizes ==="
          [ -f "$FW" ] && echo "firmware.bin : $(du -h "$FW" | cut -f1)"
          [ -f "$FS" ] && echo "littlefs.bin : $(du -h "$FS" | cut -f1)"

      # ── 7. Locate and rename output files ─────────────────────────────────
      - name: Collect output binaries
        run: |
          mkdir -p artifacts

          # Main firmware
          FW=$(find elite-clock/.pio/build/esp32-c3-super-mini -name 'firmware.bin' | head -1)
          cp "$FW" artifacts/elite-clock-firmware.bin

          # Bootloader
          BL=$(find elite-clock/.pio/build/esp32-c3-super-mini -name 'bootloader.bin' | head -1)
          [ -f "$BL" ] && cp "$BL" artifacts/bootloader.bin || true

          # Partition table
          PT=$(find elite-clock/.pio/build/esp32-c3-super-mini -name 'partitions.bin' | head -1)
          [ -f "$PT" ] && cp "$PT" artifacts/partitions.bin || true

          # LittleFS filesystem image (web UI)
          FS=$(find elite-clock/.pio/build/esp32-c3-super-mini -name 'littlefs.bin' | head -1)
          [ -f "$FS" ] && cp "$FS" artifacts/elite-clock-filesystem.bin || true

          echo "=== Build artifacts ==="
          ls -lh artifacts/

      # ── 8. Generate flash script ──────────────────────────────────────────
      - name: Generate flash instructions
        run: |
          cat > artifacts/FLASH_INSTRUCTIONS.md << 'EOF'
          # Elite Clock — Flash Instructions

          ## Requirements
          Install esptool.py:
          ```
          pip install esptool
          ```

          ## Flash all-in-one (recommended)
          Replace `/dev/ttyUSB0` (Linux) or `COM3` (Windows) with your port.

          ```bash
          esptool.py --chip esp32c3 \
            --port /dev/ttyUSB0 \
            --baud 460800 \
            --before default_reset \
            --after hard_reset \
            write_flash \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 4MB \
            0x0000  bootloader.bin \
            0x8000  partitions.bin \
            0x10000 elite-clock-firmware.bin \
            0x290000 elite-clock-filesystem.bin
          ```

          ## Flash firmware only (over-the-air update)
          ```bash
          esptool.py --chip esp32c3 --port /dev/ttyUSB0 --baud 460800 \
            write_flash 0x10000 elite-clock-firmware.bin
          ```

          ## Flash filesystem only (update web UI)
          ```bash
          esptool.py --chip esp32c3 --port /dev/ttyUSB0 --baud 460800 \
            write_flash 0x290000 elite-clock-filesystem.bin
          ```

          ## First boot
          1. If no Wi-Fi is saved, connect to **EliteClock-Setup** (pass: `eliteclock`)
          2. Navigate to **http://192.168.4.1** to configure Wi-Fi and time
          3. After connecting to Wi-Fi, find the device IP in your router's
             DHCP list and navigate there to access the full control panel.

          ## Pin assignment (ESP32-C3 Super Mini)
          | Signal | GPIO |
          |--------|------|
          | TFT MOSI | 6 |
          | TFT SCK  | 4 |
          | TFT CS   | 7 |
          | TFT DC   | 2 |
          | TFT RST  | 3 |
          | TFT BL   | 8 |
          | Touch CS | 9 |
          | Touch IRQ| 10 |
          EOF

      # ── 9. Upload all artifacts ───────────────────────────────────────────
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elite-clock-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      # ── 10. Create GitHub Release (only on version tags) ──────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Elite Clock ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/elite-clock-firmware.bin
            artifacts/elite-clock-filesystem.bin
            artifacts/bootloader.bin
            artifacts/partitions.bin
            artifacts/FLASH_INSTRUCTIONS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
