; =============================================================================
;  Elite Clock — PlatformIO project configuration
;  Target: ESP32-C3 Super Mini (160 MHz, 4 MB flash, USB-C / CDC serial)
; =============================================================================

[env:esp32-c3-super-mini]
; No platform version pin — PlatformIO picks the latest stable espressif32.
; Pinning a specific version risks referencing a tag that doesn't exist in
; the registry, which causes PlatformIO to fall back to compiling tools from
; source and can trigger ./configure failures in CI.
platform     = espressif32
board        = esp32-c3-devkitm-1
framework    = arduino

; ── MCU settings ─────────────────────────────────────────────────────────────
board_build.mcu          = esp32c3
board_build.f_cpu        = 160000000L
board_upload.flash_size  = 4MB
; NOTE: Do NOT name this file min_spiffs.csv — the Arduino-ESP32 framework
; ships its own min_spiffs.csv and it takes precedence, putting LittleFS at
; 0x3d0000 instead of our intended 0x290000. partitions_elite.csv is unique.
board_build.partitions   = partitions_elite.csv
board_build.filesystem   = littlefs

; ── Serial monitor ────────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; TFT_eSPI user setup — consumed at compile time, no User_Setup.h needed
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

    ; SPI bus GPIOs (ESP32-C3 Super Mini)
    -DTFT_MOSI=6
    -DTFT_SCLK=4
    -DTFT_MISO=5
    -DTFT_CS=7
    -DTFT_DC=2
    -DTFT_RST=3
    -DTFT_BL=8
    -DTFT_BACKLIGHT_ON=HIGH

    ; Touch controller (XPT2046, shared SPI bus)
    ; NOTE: Do NOT define TOUCH_CS here. TFT_eSPI's ESP32-C3 processor file
    ; includes SPIFFS.h inside an #ifdef TOUCH_CS block (for calibration storage).
    ; SPIFFS is not available on this Arduino-ESP32 2.x build and causes a fatal
    ; compile error. We use XPT2046_Touchscreen as a standalone library and
    ; define the CS pin directly in main.cpp instead.
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

    ; TFT_eSPI fonts — GLCD (built-in) and Font2 (small bitmap) only.
    ; Do NOT add SMOOTH_FONT=1: Smooth_font.h references the SPIFFS object
    ; which does not exist on ESP32-C3 Arduino-ESP32 2.x. We use only
    ; setTextFont(1)/setTextSize() which need only GLCD and are always available.
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1

; ── Library dependencies ──────────────────────────────────────────────────────
; All entries use the PlatformIO registry (owner/name @ semver).
; No GitHub URL dependencies — those can pull unversioned HEAD commits
; and sometimes include native build scripts that cause CI failures.
;
; mathieucarbou/AsyncTCP and mathieucarbou/ESPAsyncWebServer are the current
; actively maintained forks that work correctly with ESP32-C3 / Arduino 3.x.
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    ; XPT2046_Touchscreen is not in the PlatformIO registry under any name that
    ; resolves reliably. The GitHub URL is safe here — it is a pure Arduino
    ; library (only .h/.cpp files, no CMakeLists or configure scripts) so it
    ; will never trigger a native source-build or ./configure failure.
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    mathieucarbou/AsyncTCP @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.3.8
    bblanchon/ArduinoJson @ ^6.21.3
    knolleary/PubSubClient @ ^2.8

; NOTE: Do NOT add platform_packages overrides here.
; Specifying tool versions that don't match what the platform expects
; (e.g. tool-mklittlefs @ ~1.203.0 when the platform uses 3.x) causes
; PlatformIO to attempt a source build, which fails without autotools.
; Let the platform manage its own tool versions.

; ── Upload filesystem separately ─────────────────────────────────────────────
[env:esp32-c3-super-mini-fs]
extends  = env:esp32-c3-super-mini
targets  = buildfs, uploadfs
