; =============================================================================
;  Elite Clock — PlatformIO project configuration
;  Target: ESP32-C3 Super Mini (160 MHz, 4 MB flash, USB-C / CDC serial)
; =============================================================================

[env:esp32-c3-super-mini]
; Pin the platform version so the CI environment is fully reproducible.
; 6.9.0 ships pre-built tool-mklittlefs binaries for Linux x86_64, which
; avoids the autotools ./configure fallback that breaks on ubuntu-latest.
platform     = espressif32 @ 6.9.0
board        = esp32-c3-devkitm-1
framework    = arduino

; ── MCU settings ─────────────────────────────────────────────────────────────
board_build.mcu          = esp32c3
board_build.f_cpu        = 160000000L
board_upload.flash_size  = 4MB
board_build.partitions   = min_spiffs.csv
board_build.filesystem   = littlefs

; ── Serial monitor ────────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; ── TFT_eSPI user setup (UC8230 / ILI9341-compatible) ─────────────────
    ; These defines are consumed directly by TFT_eSPI so no User_Setup.h needed.
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

    ; SPI bus GPIOs (ESP32-C3 Super Mini)
    -DTFT_MOSI=6
    -DTFT_SCLK=4
    -DTFT_MISO=5
    -DTFT_CS=7
    -DTFT_DC=2
    -DTFT_RST=3
    -DTFT_BL=8
    -DTFT_BACKLIGHT_ON=HIGH

    ; Touch (XPT2046 — shares SPI bus, own CS)
    -DTOUCH_CS=9

    ; SPI speeds
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

    ; Fonts (GLCD + smooth font needed for the web UI status text on TFT)
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

; ── Library dependencies ──────────────────────────────────────────────────────
; All libraries referenced by PlatformIO registry ID@version — no GitHub URLs.
; mathieucarbou/AsyncTCP and mathieucarbou/ESPAsyncWebServer are the current
; maintained forks that work correctly on ESP32-C3 with Arduino core 2.x/3.x.
; They resolve entirely from pre-built sources; no native ./configure needed.
lib_deps =
    ; Display + touch
    bodmer/TFT_eSPI @ ^2.5.43
    paulstoffregen/XPT2046_Touchscreen @ ^1.4

    ; Async web server stack
    mathieucarbou/AsyncTCP @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.3.8

    ; JSON
    bblanchon/ArduinoJson @ ^6.21.3

    ; MQTT (Home Assistant)
    knolleary/PubSubClient @ ^2.8

    ; The following are part of the ESP32 Arduino core — no separate entry needed:
    ;   ArduinoOTA, ESPmDNS, DNSServer, LittleFS, Preferences, WiFi

; ── Explicit tool version — ensures pre-built binary is used in CI ────────────
; Without this pin PlatformIO may try to compile mklittlefs from source,
; which requires autotools and fails on a stock ubuntu-latest runner.
platform_packages =
    tool-mklittlefs @ ~1.203.0

; ── Upload filesystem separately with this target ─────────────────────────────
[env:esp32-c3-super-mini-fs]
extends  = env:esp32-c3-super-mini
targets  = buildfs, uploadfs
