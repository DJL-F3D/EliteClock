; =============================================================================
;  Elite Clock — PlatformIO project configuration
;  Target: ESP32-C3 Super Mini (160 MHz, 4 MB flash, USB-C / CDC serial)
; =============================================================================

[env:esp32-c3-super-mini]
platform     = espressif32
board        = esp32-c3-devkitm-1
framework    = arduino

; ── MCU settings ─────────────────────────────────────────────────────────────
board_build.mcu          = esp32c3
board_build.f_cpu        = 160000000L
board_upload.flash_size  = 4MB
board_build.partitions   = min_spiffs.csv
board_build.filesystem   = littlefs

; ── Serial monitor ────────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; ── TFT_eSPI user setup (UC8230 / ILI9341-compatible) ─────────────────
    ; These defines are consumed directly by TFT_eSPI so no User_Setup.h needed.
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

    ; SPI bus GPIOs (ESP32-C3 Super Mini)
    -DTFT_MOSI=6
    -DTFT_SCLK=4
    -DTFT_MISO=5
    -DTFT_CS=7
    -DTFT_DC=2
    -DTFT_RST=3
    -DTFT_BL=8
    -DTFT_BACKLIGHT_ON=HIGH

    ; Touch (XPT2046 — shares SPI bus, own CS)
    -DTOUCH_CS=9

    ; SPI speeds
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

    ; Fonts (GLCD + smooth font needed for the web UI status text on TFT)
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

; ── Library dependencies ──────────────────────────────────────────────────────
; Pin versions that are known-good together on ESP32-C3 / Arduino 2.x
lib_deps =
    ; Display + touch
    bodmer/TFT_eSPI @ ^2.5.43
    paulstoffregen/XPT2046_Touchscreen @ ^1.4

    ; Async web server stack (must use these specific forks for ESP32)
    https://github.com/esphome/AsyncTCP.git
    https://github.com/esphome/ESPAsyncWebServer.git

    ; JSON
    bblanchon/ArduinoJson @ ^6.21.3

    ; MQTT (for Home Assistant)
    knolleary/PubSubClient @ ^2.8

    ; OTA (built into ESP32 Arduino core — no extra dep needed)
    ; mDNS  (built into ESP32 Arduino core — no extra dep needed)
    ; DNSServer (built into ESP32 Arduino core — no extra dep needed)
    ; LittleFS (built into ESP32 Arduino core — no extra dep needed)

; ── Upload filesystem separately with this target ─────────────────────────────
[env:esp32-c3-super-mini-fs]
extends  = env:esp32-c3-super-mini
targets  = buildfs, uploadfs
