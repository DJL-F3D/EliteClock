[env:esp32-c3-super-mini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_upload.flash_size = 4MB
board_build.partitions = min_spiffs.csv

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; TFT_eSPI display configuration for UC8230 (ILI9341-compatible)
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=6
    -DTFT_SCLK=4
    -DTFT_CS=7
    -DTFT_DC=2
    -DTFT_RST=3
    -DTFT_BL=8
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=9
    -DSPI_FREQUENCY=40000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; Libraries
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bodmer/TFT_eWidget @ ^0.0.5
    ESP Async WebServer @ ^1.2.3
    AsyncTCP @ ^1.1.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    paulstoffregen/XPT2046_Touchscreen @ ^1.4

; Filesystem (LittleFS for web UI)
board_build.filesystem = littlefs

[env:esp32-c3-super-mini-upload-fs]
extends = env:esp32-c3-super-mini
targets = uploadfs
