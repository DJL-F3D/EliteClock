; =============================================================================
;  Elite Clock — PlatformIO project configuration  (LovyanGFX edition)
;  Target: ESP32-C3 Super Mini (160 MHz, 4 MB flash)
; =============================================================================

[env:esp32-c3-super-mini]
platform    = espressif32
board       = esp32-c3-devkitm-1
framework   = arduino

board_build.mcu         = esp32c3
board_build.f_cpu       = 160000000L
board_upload.flash_size = 4MB
board_build.partitions  = partitions_elite.csv
board_build.filesystem  = littlefs

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Build flags ───────────────────────────────────────────────────────────────
; LovyanGFX reads all display config from src/display_config.h at runtime —
; no build-time -DILI9488 / -DTFT_MOSI / etc. flags needed.
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DLGFX_USE_V1          ; LovyanGFX v1 API
    ; NOTE: Do NOT add -DARDUINO_USB_CDC_ON_BOOT=1 — breaks Serial on 2.0.18

; ── Libraries ────────────────────────────────────────────────────────────────
; LovyanGFX replaces both TFT_eSPI and XPT2046_Touchscreen.
; Touch is handled natively inside LovyanGFX's LGFX class.
lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    mathieucarbou/AsyncTCP @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.3.8
    bblanchon/ArduinoJson @ ^6.21.3
    knolleary/PubSubClient @ ^2.8

; ESPAsyncWebServer 3.6+ depends on the framework WebServer library,
; which fails to compile on Arduino-ESP32 2.x (WiFiServer.h missing).
; We use ESPAsyncWebServer exclusively so WebServer is not needed.
lib_ignore = WebServer

; ── Filesystem upload ─────────────────────────────────────────────────────────
[env:esp32-c3-super-mini-fs]
extends = env:esp32-c3-super-mini
targets = buildfs, uploadfs
